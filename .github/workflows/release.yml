name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Git tag to build and publish, for example v1.0.5"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  release-windows:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify package version matches tag
        run: |
          $tagVersion = $env:RELEASE_TAG.TrimStart('v')
          $packageVersion = (node -p "require('./package.json').version")
          if ($packageVersion -ne $tagVersion) {
            Write-Error "package.json version $packageVersion does not match release tag $env:RELEASE_TAG"
            exit 1
          }
        shell: pwsh

      - name: Clean release directory
        run: |
          if (Test-Path release) {
            Remove-Item -LiteralPath release -Recurse -Force
          }
        shell: pwsh

      - name: Ensure GitHub release exists
        run: |
          gh release view "$env:RELEASE_TAG" > $null 2>&1
          if ($LASTEXITCODE -ne 0) {
            $version = $env:RELEASE_TAG.TrimStart('v')
            gh release create "$env:RELEASE_TAG" --title "Gleito $version" --generate-notes
          }
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Windows release
        run: npm run release:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
