name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Git tag to build and publish"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clean release directory
        run: |
          if (Test-Path release) {
            Remove-Item -LiteralPath release -Recurse -Force
          }
        shell: pwsh

      - name: Ensure GitHub release exists
        run: |
          gh release view "$env:RELEASE_TAG" > $null 2>&1
          if ($LASTEXITCODE -ne 0) {
            $version = $env:RELEASE_TAG.TrimStart('v')
            gh release create "$env:RELEASE_TAG" --title "Gleito $version" --notes ""
          }
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Windows release
        run: npm run release:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
